<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <style>
    .bg { fill: #0d1117; }
    .text { fill: #c9d1d9; font-family: 'Courier New', Courier, monospace; font-size: 14px; }
    .green { fill: #3fb950; font-weight: bold; }
    .blue { fill: #58a6ff; font-weight: bold; }
    .cyan { fill: #38bdf8; font-weight: bold; }
    .yellow { fill: #e3b341; }
    .red { fill: #f85149; }
    @keyframes typing { from { width: 0; } to { width: 100%; } }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @keyframes progress { 
      0% { content: "----------------------------------------"; }
      10% { content: "####------------------------------------"; }
      50% { content: "####################--------------------"; }
      100% { content: "########################################"; }
    }
    
    .line1 { opacity: 0; animation: fadein 0.1s forwards 0.5s; }
    .line2 { opacity: 0; animation: fadein 0.1s forwards 1.0s; }
    .line3 { opacity: 0; animation: fadein 0.1s forwards 1.5s; }
    .line4 { opacity: 0; animation: fadein 0.1s forwards 2.0s; }
    .line5 { opacity: 0; animation: fadein 0.1s forwards 2.5s; }
    .line6 { opacity: 0; animation: fadein 0.1s forwards 3.0s; }
    .line7 { opacity: 0; animation: fadein 0.1s forwards 3.5s; }
    
    .bar { opacity: 0; animation: fadein 0.1s forwards 4.0s; }
    .bar-fill { opacity: 0; animation: fadein 0.1s forwards 4.0s; }
    @keyframes fillBar { from { width: 0; } to { width: 320px; } }
    .bar-progress { animation: fillBar 2s steps(40) forwards 4.0s; fill: #58a6ff; }
    
    .line8 { opacity: 0; animation: fadein 0.1s forwards 6.5s; }
    .line9 { opacity: 0; animation: fadein 0.1s forwards 6.7s; }
    .line10 { opacity: 0; animation: fadein 0.1s forwards 6.9s; }
    .line11 { opacity: 0; animation: fadein 0.1s forwards 7.1s; }
    .cursor { animation: blink 1s step-end infinite; fill: #c9d1d9; }
  </style>

  <rect width="100%" height="100%" class="bg" rx="10"/>
  
  <!-- Window Controls -->
  <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="6" fill="#27c93f"/>

  <g transform="translate(20, 50)">
    <text class="text line1"><tspan class="green">$</tspan> ./aetheris --target 10.0.0.1 --ports 1-10000</text>
    
    <text class="text cyan line2" y="30">     _         _   _               _     </text>
    <text class="text cyan line3" y="45">    / \   ___ | |_| |__   ___ _ __(_)___ </text>
    <text class="text cyan line4" y="60">   / _ \ / _ \| __| '_ \ / _ \ '__| / __|</text>
    <text class="text cyan line5" y="75">  / ___ \  __/| |_| | | |  __/ |  | \__ \</text>
    <text class="text cyan line6" y="90"> /_/   \_\___| \__|_| |_|\___|_|  |_|___/</text>
    
    <text class="text line7" y="125"><tspan class="blue">[*]</tspan> Target: 10.0.0.1 | Ports: 1-10000 | Concurrency: 5000</text>
    
    <text class="text bar" y="160">⠧ [00:00:02] [</text>
    <rect x="135" y="150" width="320" height="12" fill="#21262d" class="bar-fill"/>
    <rect x="135" y="150" height="12" class="bar-progress"/>
    <text class="text bar" y="160" x="460">] 10000/10000 ports (0s)</text>

    <text class="text line8" y="200"><tspan class="green">[+]</tspan> Scan completed in 2.14s</text>
    <text class="text line9" y="220"><tspan class="green">[+]</tspan> Open Ports:</text>
    <text class="text line10" y="240">    - <tspan class="yellow">22</tspan> <tspan class="green">open</tspan></text>
    <text class="text line11" y="260">    - <tspan class="yellow">80</tspan> <tspan class="green">open</tspan></text>
    
    <text class="text" y="300" opacity="0" style="animation: fadein 0.1s forwards 7.5s"><tspan class="green">$</tspan> <tspan class="cursor">█</tspan></text>
  </g>
</svg>
